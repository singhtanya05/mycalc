name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: 📦 Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: 📦 Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: 🌐 Prepare Remote Directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/mycalc
            sudo chown -R ubuntu:ubuntu /var/www/mycalc

      - name: 📤 Deploy Frontend Assets
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/mycalc/"
          strip_components: 2

      - name: 📤 Deploy Backend JAR
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/target/calc-backend-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/"
          strip_components: 2

      - name: ⚙️ Restart Services
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Move jar to correct name just in case
            mv /home/ubuntu/calc-backend-0.0.1-SNAPSHOT.jar /home/ubuntu/mycalc-backend.jar
            
            # Restart backend
            sudo systemctl daemon-reload
            sudo systemctl restart mycalc
            
            # Restart Nginx
            sudo systemctl restart nginx
            
            echo "✅ Deployment completed successfully!"

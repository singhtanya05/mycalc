version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8081:8081"
    environment:
      - MATHPIX_APP_ID=${MATHPIX_APP_ID:-}
      - MATHPIX_APP_KEY=${MATHPIX_APP_KEY:-}
      - LATEX_OCR_URL=${LATEX_OCR_URL:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
